site_name: missing_imputation
site_description: Imputation of missing values in longitudinal clinical patient-reported outcome data
site_url: https://rtcrump.github.io/missing_imputation/
repo_url: https://github.com/rtcrump/missing_imputation
repo_name: rtcrump/missing_imputation

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.sections
    - navigation.expand
    - toc.follow

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - attr_list

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: false
            show_root_heading: true
            heading_level: 3
            members_order: source
            docstring_style: numpy
            show_signature_annotations: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Methods Guide: methods.md
  - Evaluation & Benchmarking: evaluation.md
  - CLI Reference: cli.md
  - API Reference: api.md
